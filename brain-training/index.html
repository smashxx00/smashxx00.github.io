<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Training · 认知训练</title>
<style>
:root {
  --bg: #f5f7fa; --card: #fff; --text: #1f2a36; --muted: #6f7c8a;
  --accent: #1f7a8c; --accent-light: rgba(31,122,140,0.08); --accent-grad: linear-gradient(135deg, #1f7a8c, #176b7e);
  --warm: #ef8f5a; --green: #27ae60; --red: #e74c3c; --border: #e8ecf0;
  --radius: 12px; --radius-sm: 8px; --shadow: 0 4px 20px rgba(0,0,0,0.08); --ease: cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;}
h1{font-size:22px;text-align:center;margin-bottom:8px;letter-spacing:0.02em;}
.subtitle{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px;}
/* Container */
.app{width:100%;max-width:540px;}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.tab{flex:1 0 auto;min-width:fit-content;padding:10px 16px;border-radius:999px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s var(--ease);white-space:nowrap;text-align:center;}
.tab:hover{border-color:var(--accent);color:var(--accent);}
.tab.active{background:var(--accent-grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(31,122,140,0.25);}
/* Card */
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
/* Screen */
.screen{display:none;padding:28px 24px;}
.screen.active{display:block;animation:fadeIn 0.3s var(--ease);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Settings */
.setting-group{margin-bottom:20px;}
.setting-label{display:block;font-weight:700;margin-bottom:6px;font-size:14px;}
.setting-desc{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.4;}
.option-row{display:flex;gap:8px;flex-wrap:wrap;}
.option{flex:1;min-width:40px;padding:10px 0;border:2px solid var(--border);background:#fff;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:14px;transition:all 0.15s var(--ease);text-align:center;}
.option:hover{border-color:var(--accent);}
.option.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.range-input{width:100%;margin:8px 0;height:6px;-webkit-appearance:none;background:var(--border);border-radius:3px;outline:none;}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;}
.range-value{text-align:center;font-weight:600;color:var(--accent);font-size:14px;}
/* Rules */
.rule-box{background:#f8fafb;padding:12px 14px;border-radius:var(--radius-sm);margin:14px 0;font-size:12px;line-height:1.5;border-left:3px solid var(--accent);}
.rule-box h3{margin-bottom:4px;font-size:13px;}
/* Buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s var(--ease);font-family:inherit;margin-top:10px;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--accent-grad);color:#fff;box-shadow:0 4px 14px rgba(31,122,140,0.25);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-secondary{background:#ecf0f1;color:var(--text);margin-top:6px;}
.btn-secondary:active{background:#bdc3c7;}
.btn-test{background:var(--green);color:#fff;margin-top:5px;}
/* N-Back grid */
.nb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:270px;margin:20px auto;}
.nb-cell{aspect-ratio:1;border-radius:10px;background:#ecf0f1;transition:all 0.15s;}
.nb-cell.highlight{background:var(--accent);box-shadow:0 0 20px rgba(31,122,140,0.5);}
/* Key hints */
.key-hint{display:flex;gap:12px;margin:20px 0;justify-content:center;}
.key-card{flex:1;max-width:200px;padding:16px 10px;background:#f8fafb;border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:all 0.1s;user-select:none;}
.key-card:active{transform:scale(0.96);}
.key-code{font-size:22px;font-weight:800;color:var(--accent);margin-bottom:4px;}
.key-desc{font-size:11px;color:var(--muted);line-height:1.3;}
/* Progress */
.progress-bar{width:100%;height:5px;background:#ecf0f1;border-radius:3px;overflow:hidden;margin:10px 0;}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width 0.3s linear;}
/* Feedback */
.feedback{text-align:center;font-size:16px;font-weight:600;height:22px;margin:6px 0;}
.feedback.correct{color:var(--green);}
.feedback.wrong{color:var(--red);}
/* Countdown */
.countdown{font-size:64px;font-weight:800;text-align:center;color:var(--accent);margin:20px 0;}
/* PVT */
.pvt-stim{width:150px;height:150px;border-radius:24px;background:#ecf0f1;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);cursor:pointer;transition:background 0.05s;}
/* GNG */
.gng-stim{width:110px;height:110px;border-radius:50%;margin:20px auto;background:#ecf0f1;transition:all 0.15s;}
.gng-stim.go{background:var(--green);box-shadow:0 0 30px rgba(39,174,96,0.4);}
.gng-stim.nogo{background:var(--red);box-shadow:0 0 30px rgba(231,76,60,0.4);}
/* VS */
.vs-grid{display:grid;gap:6px;justify-content:center;margin:16px auto;}
.vs-cell{width:44px;height:44px;border-radius:8px;background:#ecf0f1;border:2px solid transparent;cursor:pointer;transition:all 0.15s;}
.vs-cell.show{background:var(--accent);border-color:var(--accent);}
.vs-cell.picked{border-color:var(--warm);box-shadow:0 0 0 2px var(--warm);}
/* Stats */
.stats-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.stat-card{text-align:center;min-width:55px;padding:8px 10px;background:#f8fafb;border-radius:var(--radius-sm);}
.stat-val{font-size:18px;font-weight:700;color:var(--accent);}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
/* Results */
.result-card{background:#f8fafb;padding:14px;border-radius:var(--radius-sm);margin:12px 0;}
.result-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.result-row:last-child{border-bottom:none;}
.result-row span:last-child{font-weight:700;}
.result-comment{text-align:center;font-size:13px;margin:12px 0;line-height:1.5;}
.accuracy-high{color:var(--green);}
.accuracy-medium{color:var(--warm);}
.accuracy-low{color:var(--red);}
@media(max-width:480px){body{padding:20px 10px 40px}.screen{padding:20px 16px}}
</style>
</head>
<body>

<div class="app">
  <h1>🧠 认知训练中心</h1>
  <p class="subtitle">科学验证的脑力训练 · 提升工作记忆 · 专注力 · 反应速度</p>

  <div class="tabs">
    <button class="tab active" data-game="nback">🔄 N-Back</button>
    <button class="tab" data-game="pvt">⚡ 反应冲刺</button>
    <button class="tab" data-game="gng">🎯 信号检测</button>
    <button class="tab" data-game="vs">🧩 记忆匹配</button>
    <button class="tab" data-game="history">📊 历史</button>
  </div>

  <div class="card" id="card"></div>
</div>

<script>
// ═══════════ GLOBAL ═══════════
let currentGame = 'nback';
let history = JSON.parse(localStorage.getItem('brain-history') || '[]');
const GAME_NAMES = { nback:'N-Back', pvt:'反应冲刺', gng:'信号检测', vs:'记忆匹配' };
const card = document.getElementById('card');

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function el(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v])=>{
    if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==='cls') e.className=v;
    else if (k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  kids.forEach(c=>{if(c!=null){if(typeof c==='string')e.appendChild(document.createTextNode(c));else e.appendChild(c)}});
  return e;
}

// Tab switching
$$('.tab').forEach(tab => tab.addEventListener('click', () => {
  $$('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentGame = tab.dataset.game;
  render();
}));

function saveHistory(result) {
  history.unshift({...result, game:currentGame, date:new Date().toLocaleDateString('zh-CN'), time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  if (history.length > 100) history = history.slice(0, 100);
  localStorage.setItem('brain-history', JSON.stringify(history));
}

// ═══════════ N-BACK (original mechanics) ═══════════
function renderNBack() {
  const cfg = { n:2, mode:'single', duration:30, interval:3000, showTime:500, volume:0.8, letters:['A','B','C','D','E','F','G','H','K','L'] };
  const st = { visualSeq:[], audioSeq:[], curIdx:0, total:0, correct:0, hit:0, miss:0, falseAlarm:0, vPressed:false, aPressed:false, isTraining:false, timer:null, progressTimer:null, startTime:0 };
  const audioCache = {};
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) { const AC = window.AudioContext||window.webkitAudioContext; if(AC) audioCtx = new AC(); }
    if (audioCtx?.state==='suspended') audioCtx.resume();
  }
  function preload() {
    cfg.letters.forEach(l=>{if(!audioCache[l]){const a=new Audio(`https://dict.youdao.com/dictvoice?audio=${l.toLowerCase()}&type=2`);a.volume=cfg.volume;a.preload='auto';a.load();audioCache[l]=a}});
  }
  function playLetter(l) {
    initAudio();
    if (audioCache[l]) audioCache[l].play().catch(()=>fallbackSpeak(l));
    else fallbackSpeak(l);
  }
  function fallbackSpeak(l) {
    if('speechSynthesis'in window){const u=new SpeechSynthesisUtterance(l);u.lang='en-US';u.volume=cfg.volume;u.rate=1.2;speechSynthesis.cancel();speechSynthesis.speak(u);}
  }

  function showScreen(name) {
    $$('.nb-screen').forEach(s=>s.style.display='none');
    $(`#nb-${name}`).style.display='block';
  }

  function genSeq() {
    const totalTime = cfg.duration*1000;
    const trialTime = cfg.showTime + cfg.interval;
    st.total = Math.floor(totalTime/trialTime);
    st.visualSeq=[]; st.audioSeq=[];
    for(let i=0;i<st.total;i++){
      let n; if(i>=cfg.n&&Math.random()<0.25) n=st.visualSeq[i-cfg.n]; else n=Math.floor(Math.random()*9);
      st.visualSeq.push(n);
    }
    if(cfg.mode==='dual'){
      for(let i=0;i<st.total;i++){
        let l; if(i>=cfg.n&&Math.random()<0.25) l=st.audioSeq[i-cfg.n]; else l=cfg.letters[Math.floor(Math.random()*cfg.letters.length)];
        st.audioSeq.push(l);
      }
    }
  }

  function highlight(i) { $$('.nb-cell').forEach(c=>c.classList.remove('highlight')); if(i!=null&&i>=0&&i<9) $$('.nb-cell')[i].classList.add('highlight'); }

  function feedback(text, isGood) {
    const fb = $('#nb-feedback'); fb.textContent=text; fb.className='feedback'+(isGood!==undefined?(isGood?' correct':' wrong'):'');
    setTimeout(()=>{fb.textContent='';fb.className='feedback'},500);
  }

  function handleKey(key) {
    const i=st.curIdx; if(i<cfg.n||!st.isTraining) return;
    if(key==='F'&&!st.vPressed){st.vPressed=true;
      const m=st.visualSeq[i]===st.visualSeq[i-cfg.n];
      if(m){st.correct++;st.hit++;feedback('✓ 正确！',true)}else{st.falseAlarm++;feedback('✗ 误报',false)}
    }
    if(key==='J'&&cfg.mode==='dual'&&!st.aPressed){st.aPressed=true;
      const m=st.audioSeq[i]===st.audioSeq[i-cfg.n];
      if(m){st.correct++;st.hit++;feedback('✓ 正确！',true)}else{st.falseAlarm++;feedback('✗ 误报',false)}
    }
  }

  function checkMisses() {
    const i=st.curIdx; if(i<cfg.n) return;
    if(!st.vPressed&&st.visualSeq[i]===st.visualSeq[i-cfg.n]) st.miss++;
    if(cfg.mode==='dual'&&!st.aPressed&&st.audioSeq[i]===st.audioSeq[i-cfg.n]) st.miss++;
  }

  function showStimulus() {
    if(st.curIdx>=st.total){endTraining();return;}
    st.vPressed=false; st.aPressed=false;
    highlight(st.visualSeq[st.curIdx]);
    if(cfg.mode==='dual') playLetter(st.audioSeq[st.curIdx]);
    st.timer=setTimeout(()=>{highlight(-1);st.timer=setTimeout(()=>{checkMisses();st.curIdx++;showStimulus()}, cfg.interval)}, cfg.showTime);
  }

  function startCountdown(cb) {
    showScreen('countdown'); let c=3;$('#nb-count').textContent=c;
    const t=setInterval(()=>{c--;$('#nb-count').textContent=c;if(c===0){clearInterval(t);cb()}},1000);
  }

  function startTraining() {
    showScreen('training'); genSeq(); st.curIdx=0; st.correct=0; st.hit=0; st.miss=0; st.falseAlarm=0; st.vPressed=false; st.aPressed=false; st.isTraining=true; st.startTime=Date.now();
    $('#nb-key-j').style.display=cfg.mode==='dual'?'block':'none';
    st.progressTimer=setInterval(()=>{const elapsed=Date.now()-st.startTime;$('#nb-progress').style.width=Math.min(100,elapsed/(cfg.duration*1000)*100)+'%'},200);
    showStimulus();
  }

  function endTraining() {
    st.isTraining=false; clearTimeout(st.timer); clearInterval(st.progressTimer);
    const totalHits=st.hit+st.miss+st.falseAlarm;
    const acc=totalHits?Math.round(st.correct/totalHits*100):0;
    saveHistory({n:cfg.n,mode:cfg.mode==='dual'?'双任务':'单任务',duration:cfg.duration,total:st.total,correct:st.correct,accuracy:acc,hit:st.hit,miss:st.miss,falseAlarm:st.falseAlarm});
    showScreen('result');
    $('#nb-rn').textContent='N='+cfg.n; $('#nb-rmode').textContent=cfg.mode==='dual'?'双任务':'单任务(视觉)';
    $('#nb-rtotal').textContent=st.total; $('#nb-rcorrect').textContent=st.correct;
    $('#nb-racc').textContent=acc+'%'; $('#nb-racc').className='result-value accuracy-'+(acc>=80?'high':acc>=50?'medium':'low');
    $('#nb-rhit').textContent=st.hit; $('#nb-rmiss').textContent=st.miss; $('#nb-rfalse').textContent=st.falseAlarm;
    let comment; if(acc>=90)comment='优秀！建议进阶 N='+(cfg.n+1); else if(acc>=70)comment='良好！继续当前难度练习'; else if(acc>=50)comment='及格，多练可以提升'; else comment='加油，降低 N 值会更有信心';
    $('#nb-rcomment').textContent=comment;
  }

  function testAudio() { initAudio(); preload(); const l=cfg.letters[Math.floor(Math.random()*cfg.letters.length)]; playLetter(l); $('#nb-tf').textContent='已播放 '+l; setTimeout(()=>$('#nb-tf').textContent='',3000); }

  // Render
  card.innerHTML = `
    <div class="screen active nb-screen" id="nb-settings">
      <div class="setting-group">
        <label class="setting-label">N 值（难度）</label>
        <p class="setting-desc">新手推荐从 N=1 开始，正确率稳定 90% 再进阶</p>
        <div class="option-row" id="nb-n-options">${[1,2,3,4,5].map(n=>`<button class="option${n===cfg.n?' active':''}" data-v="${n}">${n}</button>`).join('')}</div>
      </div>
      <div class="setting-group">
        <label class="setting-label">训练模式</label>
        <div class="option-row" id="nb-mode-opts">
          <button class="option active" data-v="single">单任务(视觉)</button>
          <button class="option" data-v="dual">双任务(视觉+听觉)</button>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label">训练时长: <span class="range-value" id="nb-durv">30</span> 秒</label>
        <input type="range" min="20" max="120" step="10" value="30" class="range-input" id="nb-dur">
      </div>
      <div class="setting-group">
        <label class="setting-label">刺激间隔: <span class="range-value" id="nb-intv">3000</span> 毫秒</label>
        <p class="setting-desc">刺激呈现500ms，间隔时间为空白等待</p>
        <input type="range" min="1000" max="5000" step="500" value="3000" class="range-input" id="nb-int">
      </div>
      <div class="setting-group">
        <label class="setting-label">听觉音量: <span class="range-value" id="nb-volv">80</span>%</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="range" min="0" max="100" step="10" value="80" class="range-input" id="nb-vol" style="margin:0;flex:1">
        </div>
        <button class="btn btn-test" id="nb-test-btn">测试字母声音</button>
        <p class="setting-desc" id="nb-tf" style="text-align:center;margin-top:5px"></p>
      </div>
      <div class="rule-box"><h3>训练规则</h3>
        <p>1. 当前刺激与往前数第 N 个一致时，按对应按键</p>
        <p>2. 单任务：视觉位置匹配按 <strong>F 键</strong></p>
        <p>3. 双任务：视觉匹配按 <strong>F 键</strong>，听觉字母匹配按 <strong>J 键</strong></p>
        <p>4. 前 N 个刺激为记忆期，无需按键</p>
      </div>
      <button class="btn btn-primary" id="nb-start">开始训练</button>
    </div>
    <div class="screen nb-screen" id="nb-countdown"><h1>准备开始</h1><div class="countdown" id="nb-count">3</div><p class="subtitle">专注训练，保持呼吸平稳</p></div>
    <div class="screen nb-screen" id="nb-training">
      <div class="progress-bar"><div class="progress-fill" id="nb-progress"></div></div>
      <div class="feedback" id="nb-feedback"></div>
      <div class="nb-grid">${Array.from({length:9},(_,i)=>`<div class="nb-cell" data-idx="${i}"></div>`).join('')}</div>
      <div class="key-hint"><div class="key-card" id="nb-key-f" onclick="window._nbF?.()"><div class="key-code">F</div><div class="key-desc">视觉位置匹配</div></div><div class="key-card" id="nb-key-j" onclick="window._nbJ?.()"><div class="key-code">J</div><div class="key-desc">听觉字母匹配</div></div></div>
    </div>
    <div class="screen nb-screen" id="nb-result">
      <h1>训练完成</h1>
      <div class="result-card"><div class="result-row"><span>难度等级</span><span id="nb-rn"></span></div><div class="result-row"><span>训练模式</span><span id="nb-rmode"></span></div><div class="result-row"><span>有效试次</span><span id="nb-rtotal"></span></div><div class="result-row"><span>正确判断</span><span id="nb-rcorrect"></span></div><div class="result-row"><span>正确率</span><span id="nb-racc"></span></div><div class="result-row"><span>命中数</span><span id="nb-rhit"></span></div><div class="result-row"><span>漏报数</span><span id="nb-rmiss"></span></div><div class="result-row"><span>误报数</span><span id="nb-rfalse"></span></div></div>
      <p class="result-comment" id="nb-rcomment"></p>
      <button class="btn btn-primary" id="nb-retry">重新训练</button>
      <button class="btn btn-secondary" id="nb-back">修改设置</button>
    </div>
  `;

  // Bind events
  $('#nb-n-options').addEventListener('click',e=>{const b=e.target.closest('.option');if(!b)return;$$('#nb-n-options .option').forEach(o=>o.classList.remove('active'));b.classList.add('active');cfg.n=+b.dataset.v});
  $('#nb-mode-opts').addEventListener('click',e=>{const b=e.target.closest('.option');if(!b)return;$$('#nb-mode-opts .option').forEach(o=>o.classList.remove('active'));b.classList.add('active');cfg.mode=b.dataset.v});
  $('#nb-dur').addEventListener('input',e=>{cfg.duration=+e.target.value;$('#nb-durv').textContent=cfg.duration});
  $('#nb-int').addEventListener('input',e=>{cfg.interval=+e.target.value;$('#nb-intv').textContent=cfg.interval});
  $('#nb-vol').addEventListener('input',e=>{cfg.volume=+e.target.value/100;$('#nb-volv').textContent=e.target.value;Object.values(audioCache).forEach(a=>a.volume=cfg.volume)});
  $('#nb-test-btn').addEventListener('click',testAudio);
  $('#nb-start').addEventListener('click',()=>{initAudio();preload();startCountdown(startTraining)});
  $('#nb-retry').addEventListener('click',()=>startCountdown(startTraining));
  $('#nb-back').addEventListener('click',()=>showScreen('settings'));

  // Keyboard
  window._nbF = () => handleKey('F');
  window._nbJ = () => handleKey('J');
  document.addEventListener('keydown', function nbK(e){
    if(currentGame!=='nback'||!st.isTraining) return;
    if(e.key==='f'||e.key==='F'){e.preventDefault();handleKey('F')}
    if(e.key==='j'||e.key==='J'){e.preventDefault();handleKey('J')}
  });
}

// ═══════════ PVT ═══════════
function renderPVT() {
  const s={count:0,rts:[],lapses:0,max:25,tStart:0,runTimer:null,stimTimer:null};
  function showScr(n) { $$('.pvt-scr').forEach(s=>s.style.display='none'); $(`#pvt-${n}`).style.display='block'; }
  function next() {
    if(s.count>=s.max){showScr('done');let avg=s.rts.length?Math.round(s.rts.reduce((a,b)=>a+b)/s.rts.length):0,min=s.rts.length?Math.min(...s.rts):0,max=s.rts.length?Math.max(...s.rts):0;saveHistory({count:s.count,avgRt:avg,minRt:min,maxRt:max,lapses:s.lapses});$('#pvt-avg').textContent=avg+' ms';$('#pvt-best').textContent=min+' ms';$('#pvt-worst').textContent=max+' ms';$('#pvt-lps').textContent=s.lapses;return}
    s.count++;$('#pvt-cnt').textContent=s.count+'/'+s.max;$('#pvt-stim').style.background='#ecf0f1';$('#pvt-stim').textContent='等待…';$('#pvt-msg').textContent='';
    s.stimTimer=setTimeout(()=>{$('#pvt-stim').style.background='var(--warm)';$('#pvt-stim').textContent='快按！';s.tStart=performance.now();s.runTimer=setTimeout(()=>{s.lapses++;$('#pvt-stim').style.background='#ecf0f1';$('#pvt-stim').textContent='太慢';s.tStart=0;setTimeout(next,600)},3000)},2000+Math.random()*4000);
  }
  function handle() { if(!s.tStart) return; clearTimeout(s.runTimer); clearTimeout(s.stimTimer); const rt=Math.round(performance.now()-s.tStart); s.rts.push(rt); s.tStart=0; $('#pvt-stim').style.background='#ecf0f1'; $('#pvt-stim').textContent=rt+' ms'; const avg=Math.round(s.rts.reduce((a,b)=>a+b)/s.rts.length); $('#pvt-avgv').textContent=avg+' ms'; $('#pvt-bv').textContent=Math.min(...s.rts)+' ms'; setTimeout(next,800); }

  card.innerHTML = `
    <div class="screen active pvt-scr" id="pvt-game">
      <div class="setting-group"><label class="setting-label">训练次数</label><div class="option-row" id="pvt-max">${[15,20,25,30].map(n=>`<button class="option${n===s.max?' active':''}" data-v="${n}">${n} 次</button>`).join('')}</div></div>
      <div class="rule-box"><h3>规则</h3><p>屏幕显示「等待…」，变橙色后尽快点击屏幕或按空格键。测量反应时间。</p></div>
      <div class="stats-row"><div class="stat-card"><div class="stat-val" id="pvt-avgv">--</div><div class="stat-label">平均 ms</div></div><div class="stat-card"><div class="stat-val" id="pvt-bv">--</div><div class="stat-label">最快 ms</div></div><div class="stat-card"><div class="stat-val" id="pvt-cnt">0/${s.max}</div><div class="stat-label">次数</div></div></div>
      <div class="pvt-stim" id="pvt-stim" onclick="handle()">等待…</div>
      <div class="feedback" id="pvt-msg"></div>
      <button class="btn btn-primary" id="pvt-start">⚡ 开始训练</button>
    </div>
    <div class="screen pvt-scr" id="pvt-done"><h1>训练完成</h1><div class="result-card"><div class="result-row"><span>平均反应</span><span id="pvt-avg"></span></div><div class="result-row"><span>最快</span><span id="pvt-best"></span></div><div class="result-row"><span>最慢</span><span id="pvt-worst"></span></div><div class="result-row"><span>漏掉</span><span id="pvt-lps"></span></div></div><button class="btn btn-primary" id="pvt-retry">重新训练</button></div>
  `;
  $('#pvt-max').addEventListener('click',e=>{const b=e.target.closest('.option');if(!b)return;$$('#pvt-max .option').forEach(o=>o.classList.remove('active'));b.classList.add('active');s.max=+b.dataset.v});
  $('#pvt-start').addEventListener('click',()=>{s.count=0;s.rts=[];s.lapses=0;$('#pvt-cnt').textContent='0/'+s.max;$('#pvt-avgv').textContent='--';$('#pvt-bv').textContent='--';next()});
  $('#pvt-retry').addEventListener('click',()=>{showScr('game')});
  window._pvtHandle = handle;
  document.addEventListener('keydown',function pk(e){if(currentGame!=='pvt')return;if(e.code==='Space'){e.preventDefault();handle()}});
  $('#pvt-stim').addEventListener('click',handle);
}

// ═══════════ GO/NO-GO ═══════════
function renderGNG() {
  const s={goCount:0,hits:0,fa:0,misses:0,total:0,max:30,isGo:false,resp:false,timer:null};
  function handle(pressGo) { if(!s.resp)return; clearTimeout(s.timer); s.resp=false; if(s.isGo&&pressGo){s.hits++;$('#gng-msg').textContent='✓';$('#gng-msg').className='feedback correct'}else if(!s.isGo&&!pressGo){$('#gng-msg').textContent='✓';$('#gng-msg').className='feedback correct'}else if(s.isGo&&!pressGo){s.misses++;$('#gng-msg').textContent='漏掉';$('#gng-msg').className='feedback wrong'}else{s.fa++;$('#gng-msg').textContent='误报';$('#gng-msg').className='feedback wrong'};$('#gng-score').textContent=Math.max(0,s.hits*3-s.fa*2-s.misses);$('#gng-acc').textContent=s.goCount?Math.round(s.hits/s.goCount*100)+'%':'--%';setTimeout(nxt,400)}
  function nxt() {
    if(s.total>=s.max){saveHistory({goCount:s.goCount,hits:s.hits,falseAlarms:s.fa,misses:s.misses,total:s.total});card.innerHTML='<div class="screen active"><h1>训练完成</h1><div class="result-card"><div class="result-row"><span>Go信号</span><span>'+s.goCount+'</span></div><div class="result-row"><span>命中</span><span>'+s.hits+'</span></div><div class="result-row"><span>误报</span><span>'+s.fa+'</span></div><div class="result-row"><span>漏报</span><span>'+s.misses+'</span></div></div><button class="btn btn-primary" onclick="renderGNG()">重新训练</button></div>';return}
    s.total++; s.resp=true; s.isGo=Math.random()<0.7; if(s.isGo)s.goCount++; $('#gng-stim').className='gng-stim'+(s.isGo?' go':' nogo');$('#gng-cnt').textContent=s.total+'/'+s.max;s.timer=setTimeout(()=>{if(s.resp&&s.isGo)s.misses++;s.resp=false;nxt()},1000);
  }
  card.innerHTML = `
    <div class="screen active"><div class="setting-group"><label class="setting-label">训练次数</label><div class="option-row" id="gng-max">${[20,30,40].map(n=>`<button class="option${n===s.max?' active':''}" data-v="${n}">${n} 轮</button>`).join('')}</div></div>
    <div class="rule-box"><h3>规则</h3><p>看到 🟢 绿色按 Go/空格；看到 🔴 红色不按。训练抑制控制。</p></div>
    <div class="stats-row"><div class="stat-card"><div class="stat-val" id="gng-score">0</div><div class="stat-label">得分</div></div><div class="stat-card"><div class="stat-val" id="gng-acc">--%</div><div class="stat-label">命中率</div></div><div class="stat-card"><div class="stat-val" id="gng-cnt">0/${s.max}</div><div class="stat-label">进度</div></div></div>
    <div class="gng-stim" id="gng-stim"></div><div class="feedback" id="gng-msg"></div>
    <div class="key-hint"><div class="key-card go-card" onclick="window._gGo&&window._gGo()"><div class="key-code">GO</div><div class="key-desc">按(空格)</div></div><div class="key-card nogo-card" onclick="window._gNo&&window._gNo()"><div class="key-code">NO</div><div class="key-desc">不按(N)</div></div></div>
    <button class="btn btn-primary" id="gng-start">🎯 开始训练</button></div>
  `;
  $('#gng-max').addEventListener('click',e=>{const b=e.target.closest('.option');if(!b)return;$$('#gng-max .option').forEach(o=>o.classList.remove('active'));b.classList.add('active');s.max=+b.dataset.v});
  $('#gng-start').addEventListener('click',()=>{s.goCount=0;s.hits=0;s.fa=0;s.misses=0;s.total=0;s.resp=false;$('#gng-score').textContent='0';$('#gng-acc').textContent='--%';$('#gng-cnt').textContent='0/'+s.max;nxt()});
  window._gGo=()=>handle(true); window._gNo=()=>handle(false);
  document.addEventListener('keydown',function gk(e){if(currentGame!=='gng')return;if(e.code==='Space'){e.preventDefault();handle(true)}if(e.key==='n'||e.key==='N'){e.preventDefault();handle(false)}});
}

// ═══════════ VISUAL SPAN ═══════════
function renderVS() {
  const s={gs:4,rounds:8,round:0,correct:0,pattern:[],picks:[],nItems:0};
  function showRound() {
    s.picks=[]; s.nItems=Math.min(3+Math.floor(s.round/2),s.gs*s.gs-1); const all=Array.from({length:s.gs*s.gs},(_,i)=>i); for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]]} s.pattern=all.slice(0,s.nItems);
    $$('.vs-cell').forEach(c=>{c.classList.remove('show','picked','pickable')}); s.pattern.forEach(i=>$$('.vs-cell')[i].classList.add('show')); $('#vs-msg').textContent='记住！';$('#vs-submit').style.display='none';
    setTimeout(()=>{$$('.vs-cell').forEach(c=>c.classList.remove('show'));$$('.vs-cell').forEach(c=>c.classList.add('pickable'));$('#vs-msg').textContent='点选你记住的方块';$('#vs-submit').style.display='block'}, s.gs>=5?2500:2000);
  }
  function check() {
    const cs=new Set(s.pattern),ps=new Set(s.picks);let c=0;cs.forEach(i=>{if(ps.has(i))c++});const pct=Math.round(c/s.nItems*100);if(pct>=60)s.correct++;s.round++;
    $('#vs-score').textContent=s.correct*10;$('#vs-rnd').textContent=s.round+'/'+s.rounds;$('#vs-acc').textContent=Math.round(s.correct/s.round*100)+'%';$('#vs-msg').textContent=pct>=60?`✓ ${c}/${s.nItems}`:`✗ ${c}/${s.nItems}`;
    $$('.vs-cell').forEach(cell=>{cell.classList.remove('picked','pickable');if(cs.has(+cell.dataset.idx))cell.classList.add('show')});$('#vs-submit').style.display='none';
    setTimeout(()=>{if(s.round>=s.rounds){saveHistory({gridSize:s.gs,rounds:s.rounds,correct:s.correct,totalItems:s.nItems});card.innerHTML='<div class="screen active"><h1>训练完成</h1><div class="result-card"><div class="result-row"><span>网格</span><span>'+s.gs+'x'+s.gs+'</span></div><div class="result-row"><span>轮次</span><span>'+s.rounds+'</span></div><div class="result-row"><span>正确</span><span>'+s.correct+'</span></div></div><button class="btn btn-primary" onclick="renderVS()">重新训练</button></div>';return}showRound()},1200);
  }
  card.innerHTML = `
    <div class="screen active"><div class="setting-group"><label class="setting-label">网格大小</label><div class="option-row" id="vs-gs">${[3,4,5].map(n=>`<button class="option${n===s.gs?' active':''}" data-v="${n}">${n}×${n}</button>`).join('')}</div></div>
    <div class="rule-box"><h3>规则</h3><p>记住亮色方块位置，消失后点选。回合越后方块越多。</p></div>
    <div class="stats-row"><div class="stat-card"><div class="stat-val" id="vs-score">0</div><div class="stat-label">得分</div></div><div class="stat-card"><div class="stat-val" id="vs-rnd">0/${s.rounds}</div><div class="stat-label">轮次</div></div><div class="stat-card"><div class="stat-val" id="vs-acc">--%</div><div class="stat-label">正确率</div></div></div>
    <div class="vs-grid" id="vs-grid" style="grid-template-columns:repeat(${s.gs},44px);grid-template-rows:repeat(${s.gs},44px)">${Array.from({length:s.gs*s.gs},(_,i)=>`<div class="vs-cell" data-idx="${i}"></div>`).join('')}</div>
    <div class="feedback" id="vs-msg"></div>
    <button class="btn btn-primary" id="vs-submit" style="display:none">确认选择</button>
    <button class="btn btn-primary" id="vs-start">🧩 开始训练</button></div>
  `;
  $$('.vs-cell').forEach(cell=>cell.addEventListener('click',()=>{if(!cell.classList.contains('pickable')||cell.classList.contains('show'))return;cell.classList.toggle('picked');if(cell.classList.contains('picked'))s.picks.push(+cell.dataset.idx);else s.picks=s.picks.filter(p=>p!==+cell.dataset.idx)}));
  $('#vs-gs').addEventListener('click',e=>{const b=e.target.closest('.option');if(!b)return;$$('#vs-gs .option').forEach(o=>o.classList.remove('active'));b.classList.add('active');s.gs=+b.dataset.v;renderVS()});
  $('#vs-start').addEventListener('click',()=>{s.round=0;s.correct=0;$('#vs-score').textContent='0';$('#vs-rnd').textContent='0/'+s.rounds;$('#vs-acc').textContent='--%';showRound()});
  $('#vs-submit').addEventListener('click',check);
}

// ═══════════ HISTORY ═══════════
function renderHistory() {
  let html = '<div class="screen active"><h1>📊 训练历史</h1>';
  const all = history.slice(0, 30);
  if(!all.length) html += '<p class="subtitle">还没有训练记录</p>';
  else {
    html += '<div class="result-card">';
    all.forEach(h => {
      html += `<div class="result-row"><span>${h.date} ${h.time} · ${GAME_NAMES[h.game]||h.game}</span>`;
      if(h.game==='nback') html += `<span>N=${h.n} ${h.accuracy||0}%</span>`;
      else if(h.game==='pvt') html += `<span>${h.avgRt||0}ms</span>`;
      else if(h.game==='gng') html += `<span>${h.hits||0}中/${h.falseAlarms||0}误</span>`;
      else if(h.game==='vs') html += `<span>${h.correct||0}/${h.rounds||0}</span>`;
      html += '</div>';
    });
    html += '</div>';
  }
  html += '<button class="btn btn-secondary" onclick="render()">返回游戏</button></div>';
  card.innerHTML = html;
}

// ═══════════ Router ═══════════
function render() {
  if (currentGame === 'nback') renderNBack();
  else if (currentGame === 'pvt') renderPVT();
  else if (currentGame === 'gng') renderGNG();
  else if (currentGame === 'vs') renderVS();
  else if (currentGame === 'history') renderHistory();
}
render();
</script>
</body>
