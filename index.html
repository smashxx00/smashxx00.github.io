<!-- ═══════════ BUTTERFLIES ═══════════ -->
<div class="butterflies" aria-hidden="true">
  <!-- 右侧，较大 -->
  <div class="bfly-wrap bfly-wrap--right" data-butterfly data-speed="1.2">
    <div class="bfly">
    <svg viewBox="0 0 800 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="wingGradientR" cx="30%" cy="30%" r="70%">
          <stop offset="0%" style="stop-color:#b2f2e8;stop-opacity:0.85"/>
          <stop offset="30%" style="stop-color:#5ee6cc;stop-opacity:0.78"/>
          <stop offset="60%" style="stop-color:#26c4a8;stop-opacity:0.7"/>
          <stop offset="100%" style="stop-color:#0d8a72;stop-opacity:0.55"/>
        </radialGradient>
        <radialGradient id="wingGradient2R" cx="70%" cy="30%" r="70%">
          <stop offset="0%" style="stop-color:#c8f7ef;stop-opacity:0.72"/>
          <stop offset="40%" style="stop-color:#7ee8d4;stop-opacity:0.65"/>
          <stop offset="70%" style="stop-color:#3dd4b8;stop-opacity:0.58"/>
          <stop offset="100%" style="stop-color:#15a088;stop-opacity:0.45"/>

        <linearGradient id="bodyGradientR" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#1a6b5c"/>
          <stop offset="50%" style="stop-color:#0d4a3f"/>
          <stop offset="100%" style="stop-color:#1a6b5c"/>
        </linearGradient>
        <filter id="softGlowR" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="particleGlowR" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <style>
        .bfly-gR { animation: floatB 6s ease-in-out infinite; transform-origin: 400px 300px; }
        @keyframes floatB { 0%,100% { transform:translate(0,0) rotate(0deg) } 25% { transform:translate(12px,-18px) rotate(3deg) } 50% { transform:translate(-8px,-25px) rotate(-2deg) } 75% { transform:translate(-15px,-8px) rotate(2deg) } }
        .left-wingR { animation: flapL 3s ease-in-out infinite; transform-origin:400px 280px; }
        @keyframes flapL { 0%,100% { transform:scaleX(1) rotate(0deg) } 50% { transform:scaleX(0.55) rotate(-4deg) } }
        .right-wingR { animation: flapR 3s ease-in-out infinite; transform-origin:400px 280px; }
        @keyframes flapR { 0%,100% { transform:scaleX(1) rotate(0deg) } 50% { transform:scaleX(0.55) rotate(4deg) } }
        .particleR { animation: floatP 4s ease-in-out infinite; }
        .particleR:nth-child(odd) { animation-duration: 5s; }
        @keyframes floatP { 0% { opacity:0; transform:translate(0,0) scale(0.5) } 20% { opacity:1 } 80% { opacity:0.7 } 100% { opacity:0; transform:translate(var(--dx),var(--dy)) scale(1.2) } }
        .wing-patternR { animation: shimmer 4s ease-in-out infinite; }
        @keyframes shimmer { 0%,100% { opacity:0.5 } 50% { opacity:0.9 } }
        .wing-edgeR { animation: edgeGlow 3s ease-in-out infinite; }
        @keyframes edgeGlow { 0%,100% { stroke-opacity:0.3 } 50% { stroke-opacity:0.7 } }
        .body-pulseR { animation: bodyPulse 2s ease-in-out infinite; }
        @keyframes bodyPulse { 0%,100% { opacity:0.85 } 50% { opacity:1 } }
        .antenna-lR { animation: antSwayL 4s ease-in-out infinite; transform-origin:398px 250px; }
        @keyframes antSwayL { 0%,100% { transform:rotate(0deg) } 50% { transform:rotate(3deg) } }
        .antenna-rR { animation: antSwayR 4s ease-in-out infinite reverse; transform-origin:402px 250px; }
        @keyframes antSwayR { 0%,100% { transform:rotate(0deg) } 50% { transform:rotate(3deg) } }
        .lspotR { animation: lightMove 8s ease-in-out infinite; }
        @keyframes lightMove { 0%,100% { transform:translate(0,0); opacity:0.25 } 25% { transform:translate(18px,-12px); opacity:0.5 } 50% { transform:translate(-12px,-20px); opacity:0.3 } 75% { transform:translate(-20px,8px); opacity:0.55 } }
      </style>
      <g class="lspotR" opacity="0.25"><circle cx="200" cy="150" r="35" fill="#5ee6cc" filter="url(#softGlowR)"/></g>
      <g class="lspotR" style="animation-delay:2s" opacity="0.18"><circle cx="600" cy="180" r="25" fill="#7ee8d4" filter="url(#softGlowR)"/></g>

        <circle cx="430" cy="310" r="2" fill="#7ee8d4" filter="url(#particleGlowR)" class="particleR" style="--dx:50px;--dy:-40px;animation-delay:0.5s"/>
        <circle cx="460" cy="300" r="2" fill="#3dd4b8" filter="url(#particleGlowR)" class="particleR" style="--dx:-55px;--dy:-25px;animation-delay:1s"/>

        <g class="right-wingR">

          <path d="M400 280 C420 230,460 180,520 160 C560 148,580 170,570 200" stroke="#b2f2e8" stroke-width="1.2" fill="none" class="wing-edgeR"/>
        </g>
        <g class="body-pulseR">

          <ellipse cx="400" cy="270" rx="4" ry="4" fill="#1a6b5c"/><ellipse cx="400" cy="285" rx="3.5" ry="4" fill="#155a4e"/><ellipse cx="400" cy="300" rx="3" ry="4" fill="#155a4e"/><ellipse cx="400" cy="315" rx="2.5" ry="4" fill="#1a6b5c"/><ellipse cx="400" cy="325" rx="2" ry="3.5" fill="#0d4a3f"/>
        </g>
        <g class="antenna-lR"><path d="M398 255 C390 230,375 210,365 195" stroke="#0d4a3f" stroke-width="1.2" fill="none" stroke-linecap="round"/><circle cx="365" cy="195" r="2" fill="#5ee6cc" filter="url(#particleGlowR)"/></g>
        <g class="antenna-rR"><path d="M402 255 C410 230,425 210,435 195" stroke="#0d4a3f" stroke-width="1.2" fill="none" stroke-linecap="round"/><circle cx="435" cy="195" r="2" fill="#5ee6cc" filter="url(#particleGlowR)"/></g>
        <circle cx="320" cy="250" r="2.5" fill="#5ee6cc" filter="url(#particleGlowR)" class="particleR" style="--dx:-45px;--dy:-50px"/>
        <circle cx="480" cy="240" r="2" fill="#7ee8d4" filter="url(#particleGlowR)" class="particleR" style="--dx:55px;--dy:-40px;animation-delay:0.5s"/>
        <circle cx="280" cy="300" r="1.5" fill="#3dd4b8" filter="url(#particleGlowR)" class="particleR" style="--dx:-60px;--dy:-20px;animation-delay:1s"/>
        <circle cx="520" cy="260" r="3" fill="#b2f2e8" filter="url(#particleGlowR)" class="particleR" style="--dx:45px;--dy:-55px;animation-delay:1.5s"/>
        <circle cx="350" cy="380" r="1.5" fill="#5ee6cc" filter="url(#particleGlowR)" class="particleR" style="--dx:-35px;--dy:35px;animation-delay:2s"/>
        <circle cx="460" cy="370" r="2" fill="#7ee8d4" filter="url(#particleGlowR)" class="particleR" style="--dx:50px;--dy:25px;animation-delay:2.5s"/>
      </g>
    </svg>
  </div>
</div>

<!-- ═══════════ BAMBOO LEAVES ═══════════ -->
<div class="bamboo-bg" aria-hidden="true">
  <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#73b89f"/><stop offset="100%" stop-color="#468c73"/>
      </linearGradient>
      <linearGradient id="leafGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#95d1ba"/><stop offset="100%" stop-color="#63a68d"/>
      </linearGradient>
      <linearGradient id="bambooBranchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#5a8c7a"/><stop offset="100%" stop-color="#366353"/>
      </linearGradient>
      <g id="leaf"><path d="M0,0 C15,-8 45,-4 65,3 C45,5 15,6 0,0 Z"/></g>
      <g id="leaf-small"><path d="M0,0 C10,-5 30,-2 45,2 C30,4 10,4 0,0 Z"/></g>
      <filter id="blurBg"><feGaussianBlur stdDeviation="4"/></filter>
    </defs>
    <style>
      .bamboo-sway { animation: bsway ease-in-out infinite alternate; }
      .bamboo-leaf { animation: btremble ease-in-out infinite alternate; transform-origin: 0px 0px; }
      .bamboo-dust { animation: bfloat linear infinite; }
      .bd1 { animation-delay: 0s; } .bd2 { animation-delay: -2.5s; } .bd3 { animation-delay: -5s; } .bd4 { animation-delay: -1.2s; } .bd5 { animation-delay: -3.8s; }
      .bs-slow { animation-duration: 14s; } .bs-mid { animation-duration: 9s; } .bs-fast { animation-duration: 6s; } .bs-tremble { animation-duration: 3.5s; }
